<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="家計簿" />
<meta name="theme-color" content="#2C4A63" />
<title>家計簿</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');
  :root{
    --washi:#EFE9D8; --kinari:#F7F3E7; --sumi:#211D1A; --hai:#8A8067;
    --ai:#2C4A63; --ai-dark:#1B3245; --shu:#BC4B34; --shu-dark:#9C3B27;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--washi); color:var(--sumi);
    font-family:'Zen Kaku Gothic New', sans-serif; }
  .display{ font-family:'Shippori Mincho', serif; }
  .tabular{ font-variant-numeric:tabular-nums; }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
    position:relative; padding-bottom:76px; }
  header{ position:sticky; top:0; z-index:20; background:var(--ai); color:var(--washi);
    padding:18px 18px 14px; display:flex; justify-content:space-between; align-items:flex-end; }
  header .title{ font-weight:800; font-size:1.6rem; letter-spacing:0.02em; }
  header .sub{ font-size:10px; letter-spacing:0.25em; opacity:0.7; margin-top:2px; }
  header .r{ text-align:right; }
  header .r .label{ font-size:11px; opacity:0.7; margin-bottom:2px; }
  header .r .amt{ font-weight:700; font-size:1.4rem; }
  main{ flex:1; padding:16px; }
  .screen{ display:none; }
  .screen.active{ display:block; }
  .seg{ display:flex; padding:4px; border-radius:8px; background:var(--kinari);
    border:1px solid rgba(138,128,103,0.27); margin-bottom:16px; }
  .seg button{ flex:1; padding:8px; border:none; background:transparent; border-radius:6px;
    font-size:0.9rem; font-weight:500; color:var(--sumi); font-family:inherit; }
  .seg button.active{ background:var(--ai); color:var(--washi); font-weight:700; }
  .field{ margin-bottom:16px; }
  .field .lbl{ font-size:12px; color:var(--hai); font-weight:500; margin-bottom:6px; }
  input[type=date], input[type=text], textarea{
    width:100%; padding:10px 12px; border-radius:6px; font-size:0.9rem;
    background:var(--kinari); border:1px solid rgba(138,128,103,0.35); color:var(--sumi);
    font-family:inherit; }
  textarea{ resize:none; }
  .amount-wrap{ display:flex; align-items:center; border-radius:6px;
    background:var(--kinari); border:1px solid rgba(138,128,103,0.35); padding:0 12px; }
  .amount-wrap span{ color:var(--shu); font-weight:700; }
  .amount-wrap input{ border:none; background:transparent; padding:10px 8px; font-size:1.15rem;
    font-weight:700; width:100%; }
  .chip-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
  .chip-row::-webkit-scrollbar{ display:none; }
  .cat-chip{ display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0;
    background:none; border:none; padding:2px; font-family:inherit; }
  .cat-chip .mark{ width:36px; height:36px; border-radius:9999px; display:flex; align-items:center;
    justify-content:center; font-size:0.9rem; font-weight:700; border:1.5px solid rgba(138,128,103,0.55);
    color:var(--ai-dark); font-family:'Shippori Mincho', serif; }
  .cat-chip.active .mark{ background:var(--shu); border-color:var(--shu); color:var(--washi); }
  .cat-chip .lbl{ font-size:10px; color:var(--hai); }
  .cat-chip.active .lbl{ color:var(--shu); }
  .pay-chip{ flex-shrink:0; padding:7px 14px; border-radius:9999px; font-size:0.75rem;
    background:none; border:1.5px solid rgba(138,128,103,0.55); color:var(--ai-dark); font-family:inherit; }
  .pay-chip.active{ background:var(--ai); border-color:var(--ai); color:var(--washi); font-weight:700; }
  .save-btn{ width:100%; padding:13px; border-radius:8px; border:none; background:var(--ai);
    color:var(--washi); font-weight:700; font-size:0.95rem; display:flex; align-items:center;
    justify-content:center; gap:8px; font-family:inherit; }
  .save-btn:disabled{ opacity:0.6; }
  .error-box{ margin-bottom:12px; font-size:0.85rem; padding:8px 12px; border-radius:6px;
    background:rgba(188,75,52,0.1); color:var(--shu-dark); }
  .edit-banner{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .edit-banner .t{ font-family:'Shippori Mincho', serif; font-weight:700; font-size:1.05rem; }
  .edit-banner button{ background:none; border:none; font-size:0.85rem; color:var(--hai); font-family:inherit; }
  .empty{ text-align:center; margin-top:64px; color:var(--hai); }
  .day-group{ margin-bottom:16px; }
  .day-head{ display:flex; justify-content:space-between; font-size:12px; color:var(--hai);
    font-weight:600; margin-bottom:4px; padding:0 2px; }
  .day-card{ border-radius:8px; overflow:hidden; background:var(--kinari); border:1px solid rgba(138,128,103,0.2); }
  .row{ display:flex; align-items:center; gap:12px; padding:12px; border-top:1px solid rgba(138,128,103,0.16); }
  .row:first-child{ border-top:none; }
  .row .mark{ width:32px; height:32px; border-radius:9999px; display:flex; align-items:center;
    justify-content:center; font-size:0.8rem; font-weight:700; border:1.5px solid rgba(138,128,103,0.55);
    color:var(--ai-dark); font-family:'Shippori Mincho', serif; flex-shrink:0; }
  .row .info{ flex:1; min-width:0; }
  .row .info .name{ font-size:0.9rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .info .meta{ font-size:11px; color:var(--hai); margin-top:2px; }
  .row .amt{ font-weight:700; color:var(--shu); flex-shrink:0; }
  .row .acts{ display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
  .row .acts button{ background:none; border:none; color:var(--hai); padding:0; font-size:14px; }
  .confirm-row{ display:flex; justify-content:space-between; align-items:center; padding:8px 12px;
    font-size:12px; background:rgba(188,75,52,0.08); color:var(--shu-dark); }
  .confirm-row .btns{ display:flex; gap:12px; }
  .confirm-row button{ background:none; border:none; font-family:inherit; font-size:12px; color:var(--shu-dark); font-weight:700; }
  .confirm-row .cancel{ color:var(--hai); font-weight:500; }
  .month-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .month-nav button{ background:none; border:none; color:var(--ai-dark); padding:8px; font-size:18px; }
  .month-nav .lbl{ font-family:'Shippori Mincho', serif; font-weight:700; font-size:1.1rem; }
  .total-card{ text-align:center; padding:20px; border-radius:10px; background:var(--kinari);
    border:1px solid rgba(138,128,103,0.2); margin-bottom:20px; }
  .total-card .cnt{ font-size:12px; color:var(--hai); margin-bottom:4px; }
  .total-card .amt{ font-family:'Shippori Mincho', serif; font-weight:800; font-size:2rem; color:var(--shu); }
  .sec-title{ font-size:12px; color:var(--hai); font-weight:600; margin-bottom:8px; }
  .bar-row{ margin-bottom:10px; }
  .bar-row .top{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .bar-track{ height:8px; border-radius:9999px; overflow:hidden; background:rgba(138,128,103,0.15); }
  .bar-fill{ height:100%; border-radius:9999px; background:var(--ai); }
  .pay-card{ display:flex; align-items:center; gap:10px; border-radius:8px; padding:10px 12px;
    margin-bottom:8px; background:var(--kinari); }
  .pay-card .dot{ width:10px; height:10px; border-radius:9999px; flex-shrink:0; }
  .pay-card .mid{ flex:1; min-width:0; }
  .pay-card .top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .pay-card .top .name{ font-size:0.9rem; font-weight:700; }
  .pay-card .top .amt{ font-size:0.9rem; font-weight:700; }
  .pay-card .track{ height:6px; border-radius:9999px; overflow:hidden; }
  .pay-card .pct{ font-size:11px; color:var(--hai); width:34px; text-align:right; flex-shrink:0; }
  nav{ position:fixed; bottom:0; left:0; right:0; background:var(--kinari);
    border-top:1px solid rgba(138,128,103,0.33); z-index:20; }
  nav .wrap{ max-width:480px; margin:0 auto; display:flex; }
  nav button{ flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:10px 0; background:none; border:none; color:var(--hai); font-family:inherit; }
  nav button.active{ color:var(--shu); font-weight:700; }
  nav button svg{ width:20px; height:20px; }
  #stamp-overlay{ position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center;
    pointer-events:none; }
  #stamp-overlay.show{ display:flex; }
  .seal{ width:108px; height:108px; border-radius:9999px; border:4px double var(--shu); color:var(--shu);
    background:rgba(247,243,231,0.94); display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-weight:800; font-size:2.1rem; }
  #stamp-overlay.show .seal{ animation: stampSeal 1.3s ease-out forwards; }
  @keyframes stampSeal{
    0%{ transform:scale(2.4) rotate(-18deg); opacity:0; }
    45%{ transform:scale(0.9) rotate(-9deg); opacity:1; }
    60%{ transform:scale(1.06) rotate(-11deg); opacity:1; }
    78%{ transform:scale(1) rotate(-10deg); opacity:1; }
    100%{ transform:scale(1) rotate(-10deg); opacity:0; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="title display">家計簿</div>
      <div class="sub">KAKEIBO</div>
    </div>
    <div class="r">
      <div class="label" id="header-month-label">今月の支出</div>
      <div class="amt tabular display" id="header-total">¥0</div>
    </div>
  </header>

  <main>
    <!-- ADD SCREEN -->
    <section id="screen-add" class="screen active">
      <div id="edit-banner" class="edit-banner" style="display:none;">
        <div class="t display">記録を編集</div>
        <button id="cancel-edit-btn">✕ キャンセル</button>
      </div>

      <div class="field">
        <div class="lbl">日付</div>
        <input type="date" id="date-input" />
      </div>

      <div class="field">
        <div class="lbl">金額</div>
        <div class="amount-wrap">
          <span>¥</span>
          <input type="text" inputmode="numeric" id="amount-input" placeholder="0" />
        </div>
      </div>

      <div class="field">
        <div class="lbl">店名・内容</div>
        <input type="text" id="store-input" placeholder="例：スーパーはな" />
      </div>

      <div class="field">
        <div class="lbl">カテゴリ</div>
        <div class="chip-row" id="category-chips"></div>
      </div>

      <div class="field">
        <div class="lbl">支払い方法</div>
        <div class="chip-row" id="payment-chips"></div>
      </div>

      <div class="field">
        <div class="lbl">メモ（任意）</div>
        <textarea id="memo-input" rows="2" placeholder="メモ"></textarea>
      </div>

      <div id="form-error" class="error-box" style="display:none;"></div>

      <button class="save-btn" id="save-btn">
        <span id="save-btn-label">記録する</span>
      </button>
    </section>

    <!-- HISTORY SCREEN -->
    <section id="screen-history" class="screen">
      <div id="history-container"></div>
    </section>

    <!-- SUMMARY SCREEN -->
    <section id="screen-summary" class="screen">
      <div class="month-nav">
        <button id="prev-month-btn">←</button>
        <div class="lbl" id="summary-month-label"></div>
        <button id="next-month-btn">→</button>
      </div>
      <div class="total-card">
        <div class="cnt" id="summary-count">合計支出（0件）</div>
        <div class="amt tabular" id="summary-total">¥0</div>
      </div>
      <div id="summary-body"></div>
    </section>
  </main>

  <nav>
    <div class="wrap">
      <button id="nav-add" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        記録
      </button>
      <button id="nav-history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        履歴
      </button>
      <button id="nav-summary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        集計
      </button>
    </div>
  </nav>

  <div id="stamp-overlay"><div class="seal">済</div></div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'kakeibo-expenses-standalone';
  var CATEGORIES = ['食費','日用品','交通費','娯楽','医療','衣服','通信費','光熱費','住居費','その他'];
  var CATEGORY_MARK = {食費:'食',日用品:'日',交通費:'交',娯楽:'楽',医療:'医',衣服:'衣',通信費:'通',光熱費:'光',住居費:'住',その他:'他'};
  var PAYMENT_METHODS = ['現金','クレジットカード','デビットカード','電子マネー','QRコード決済','その他'];
  var PAYMENT_COLOR = {現金:'#8A8067',クレジットカード:'#2C4A63',デビットカード:'#6C8CA8',電子マネー:'#BC4B34','QRコード決済':'#D9906F',その他:'#4A4438'};

  var expenses = [];
  try { expenses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e){ expenses = []; }

  var editingId = null;
  var selectedCategory = CATEGORIES[0];
  var selectedPayment = PAYMENT_METHODS[0];
  var summaryMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  var confirmDeleteId = null;

  function $(id){ return document.getElementById(id); }
  function todayStr(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function yen(n){ return '¥' + Number(n||0).toLocaleString('ja-JP'); }
  function makeId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function isInMonth(dateStr, monthDate){
    if(!dateStr) return false;
    var d = new Date(dateStr + 'T00:00:00');
    return d.getFullYear()===monthDate.getFullYear() && d.getMonth()===monthDate.getMonth();
  }
  function persist(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses)); } catch(e){ /* ignore */ }
  }

  // ---- tabs ----
  function switchTab(name){
    ['add','history','summary'].forEach(function(t){
      $('screen-'+t).classList.toggle('active', t===name);
      $('nav-'+t).classList.toggle('active', t===name);
    });
    if(name === 'history') renderHistory();
    if(name === 'summary') renderSummary();
  }
  $('nav-add').addEventListener('click', function(){ switchTab('add'); });
  $('nav-history').addEventListener('click', function(){ switchTab('history'); });
  $('nav-summary').addEventListener('click', function(){ switchTab('summary'); });

  // ---- chips ----
  function renderChips(){
    var catWrap = $('category-chips'); catWrap.innerHTML = '';
    CATEGORIES.forEach(function(c){
      var b = document.createElement('button');
      b.className = 'cat-chip' + (c===selectedCategory ? ' active' : '');
      b.innerHTML = '<div class="mark">'+CATEGORY_MARK[c]+'</div><div class="lbl">'+c+'</div>';
      b.addEventListener('click', function(){ selectedCategory = c; renderChips(); });
      catWrap.appendChild(b);
    });
    var payWrap = $('payment-chips'); payWrap.innerHTML = '';
    PAYMENT_METHODS.forEach(function(p){
      var b = document.createElement('button');
      b.className = 'pay-chip' + (p===selectedPayment ? ' active' : '');
      b.textContent = p;
      b.addEventListener('click', function(){ selectedPayment = p; renderChips(); });
      payWrap.appendChild(b);
    });
  }

  function resetForm(){
    editingId = null;
    $('date-input').value = todayStr();
    $('amount-input').value = '';
    $('store-input').value = '';
    $('memo-input').value = '';
    selectedCategory = CATEGORIES[0];
    selectedPayment = PAYMENT_METHODS[0];
    $('edit-banner').style.display = 'none';
    $('save-btn-label').textContent = '記録する';
    $('form-error').style.display = 'none';
    renderChips();
  }

  function startEdit(exp){
    editingId = exp.id;
    $('date-input').value = exp.date;
    $('amount-input').value = String(exp.amount);
    $('store-input').value = exp.storeName;
    $('memo-input').value = exp.memo || '';
    selectedCategory = exp.category;
    selectedPayment = exp.paymentMethod;
    $('edit-banner').style.display = 'flex';
    $('save-btn-label').textContent = '更新する';
    $('form-error').style.display = 'none';
    renderChips();
    switchTab('add');
    window.scrollTo(0,0);
  }
  $('cancel-edit-btn').addEventListener('click', resetForm);

  $('amount-input').addEventListener('input', function(e){
    e.target.value = e.target.value.replace(/[^0-9]/g,'');
  });

  function triggerStamp(){
    var el = $('stamp-overlay');
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 1300);
  }

  $('save-btn').addEventListener('click', function(){
    var amountVal = Number($('amount-input').value);
    var errEl = $('form-error');
    if(!$('amount-input').value || isNaN(amountVal) || amountVal <= 0){
      errEl.textContent = '金額を正しく入力してください。';
      errEl.style.display = 'block';
      return;
    }
    if(!$('date-input').value){
      errEl.textContent = '日付を入力してください。';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    var record = {
      id: editingId || makeId(),
      date: $('date-input').value,
      storeName: $('store-input').value.trim() || '(店名なし)',
      amount: Math.round(amountVal),
      category: selectedCategory,
      paymentMethod: selectedPayment,
      memo: $('memo-input').value.trim(),
      createdAt: editingId ? ((expenses.find(function(e){return e.id===editingId;})||{}).createdAt || new Date().toISOString()) : new Date().toISOString()
    };
    if(editingId){
      expenses = expenses.map(function(e){ return e.id===editingId ? record : e; });
    } else {
      expenses = [record].concat(expenses);
    }
    persist();
    triggerStamp();
    resetForm();
    renderHeaderTotal();
  });

  // ---- history ----
  function renderHistory(){
    var container = $('history-container');
    if(!expenses.length){
      container.innerHTML = '<div class="empty">まだ記録がありません。<br/><span style="font-size:12px;">「記録」タブから最初の支出を記録してみましょう。</span></div>';
      return;
    }
    var sorted = expenses.slice().sort(function(a,b){
      return b.date.localeCompare(a.date) || (b.createdAt||'').localeCompare(a.createdAt||'');
    });
    var groups = []; var curDate = null; var curGroup = null;
    sorted.forEach(function(e){
      if(e.date !== curDate){ curDate = e.date; curGroup = {date:e.date, items:[]}; groups.push(curGroup); }
      curGroup.items.push(e);
    });
    var html = '';
    groups.forEach(function(g){
      var d = new Date(g.date + 'T00:00:00');
      var label = d.toLocaleDateString('ja-JP', {month:'long', day:'numeric', weekday:'short'});
      var dayTotal = g.items.reduce(function(s,e){ return s+e.amount; }, 0);
      html += '<div class="day-group"><div class="day-head"><span>'+label+'</span><span class="tabular">'+yen(dayTotal)+'</span></div><div class="day-card">';
      g.items.forEach(function(e, i){
        html += '<div class="row" style="'+(i===0?'border-top:none;':'')+'">' +
          '<div class="mark">'+(CATEGORY_MARK[e.category]||'他')+'</div>' +
          '<div class="info"><div class="name">'+escapeHtml(e.storeName)+'</div>' +
          '<div class="meta">'+escapeHtml(e.category)+' · '+escapeHtml(e.paymentMethod)+'</div></div>' +
          '<div class="amt tabular">'+yen(e.amount)+'</div>' +
          '<div class="acts">' +
          '<button data-edit="'+e.id+'">✎</button>' +
          '<button data-del="'+e.id+'">🗑</button>' +
          '</div></div>';
        if(confirmDeleteId === e.id){
          html += '<div class="confirm-row"><span>この記録を削除しますか？</span><div class="btns">' +
            '<button data-confirm-del="'+e.id+'">削除する</button>' +
            '<button class="cancel" data-cancel-del="1">やめる</button></div></div>';
        }
      });
      html += '</div></div>';
    });
    container.innerHTML = html;

    container.querySelectorAll('[data-edit]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var exp = expenses.find(function(e){ return e.id === btn.getAttribute('data-edit'); });
        if(exp) startEdit(exp);
      });
    });
    container.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click', function(){
        confirmDeleteId = btn.getAttribute('data-del');
        renderHistory();
      });
    });
    container.querySelectorAll('[data-confirm-del]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-confirm-del');
        expenses = expenses.filter(function(e){ return e.id !== id; });
        confirmDeleteId = null;
        persist();
        renderHistory();
        renderHeaderTotal();
      });
    });
    container.querySelectorAll('[data-cancel-del]').forEach(function(btn){
      btn.addEventListener('click', function(){ confirmDeleteId = null; renderHistory(); });
    });
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // ---- summary ----
  function renderSummary(){
    $('summary-month-label').textContent = summaryMonth.toLocaleDateString('ja-JP', {year:'numeric', month:'long'});
    var monthExpenses = expenses.filter(function(e){ return isInMonth(e.date, summaryMonth); });
    var monthTotal = monthExpenses.reduce(function(s,e){ return s+e.amount; }, 0);
    $('summary-count').textContent = '合計支出（'+monthExpenses.length+'件）';
    $('summary-total').textContent = yen(monthTotal);

    var body = $('summary-body');
    if(!monthExpenses.length){
      body.innerHTML = '<div class="empty" style="margin-top:24px;">この月の記録はまだありません。</div>';
      return;
    }
    var catMap = {}; monthExpenses.forEach(function(e){ catMap[e.category] = (catMap[e.category]||0) + e.amount; });
    var byCategory = Object.keys(catMap).map(function(k){ return [k, catMap[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
    var maxCategory = byCategory.length ? byCategory[0][1] : 1;

    var payMap = {}; monthExpenses.forEach(function(e){ payMap[e.paymentMethod] = (payMap[e.paymentMethod]||0) + e.amount; });
    var byPayment = Object.keys(payMap).map(function(k){ return [k, payMap[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
    var maxPayment = byPayment.length ? byPayment[0][1] : 1;

    var html = '<div class="sec-title">カテゴリ別</div>';
    byCategory.forEach(function(pair){
      var cat = pair[0], amt = pair[1];
      var pct = Math.max(4, (amt/maxCategory)*100);
      html += '<div class="bar-row"><div class="top"><span>'+(CATEGORY_MARK[cat]||'')+' '+escapeHtml(cat)+'</span><span class="tabular">'+yen(amt)+'</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;"></div></div></div>';
    });

    html += '<div class="sec-title" style="margin-top:20px;">支払い方法別</div>';
    byPayment.forEach(function(pair){
      var p = pair[0], amt = pair[1];
      var color = PAYMENT_COLOR[p] || '#8A8067';
      var pct = monthTotal > 0 ? (amt/monthTotal)*100 : 0;
      var barPct = Math.max(4, (amt/maxPayment)*100);
      html += '<div class="pay-card" style="border:1px solid '+color+'33;">' +
        '<div class="dot" style="background:'+color+';"></div>' +
        '<div class="mid"><div class="top"><span class="name">'+escapeHtml(p)+'</span><span class="amt tabular">'+yen(amt)+'</span></div>' +
        '<div class="track" style="background:'+color+'22;"><div style="height:100%;border-radius:9999px;width:'+barPct+'%;background:'+color+';"></div></div></div>' +
        '<div class="pct tabular">'+pct.toFixed(0)+'%</div></div>';
    });
    body.innerHTML = html;
  }
  $('prev-month-btn').addEventListener('click', function(){
    summaryMonth = new Date(summaryMonth.getFullYear(), summaryMonth.getMonth()-1, 1);
    renderSummary();
  });
  $('next-month-btn').addEventListener('click', function(){
    summaryMonth = new Date(summaryMonth.getFullYear(), summaryMonth.getMonth()+1, 1);
    renderSummary();
  });

  function renderHeaderTotal(){
    var now = new Date();
    $('header-month-label').textContent = (now.getMonth()+1) + '月の支出';
    var total = expenses.filter(function(e){ return isInMonth(e.date, now); }).reduce(function(s,e){ return s+e.amount; }, 0);
    $('header-total').textContent = yen(total);
  }

  // ---- init ----
  resetForm();
  renderHeaderTotal();
  renderHistory();
})();
</script>
</body>
</html>
